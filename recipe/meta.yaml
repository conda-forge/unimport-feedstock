{% set name = "unimport" %}
{% set version = "1.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/unimport-{{ version }}.tar.gz
  sha256: 0842600bc89635bc8b5653318c76a1932854ab202836ff50ba797085a1a09d94

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0
  entry_points:
    - unimport=unimport.__main__:main

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=45
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - libcst >=0.3.7,<=1.8.2
    - pathspec >=0.10.1,<1
    - toml >=0.9.0,<1

test:
  imports:
    - unimport
  commands:
    - pip check
    - unimport --help
  requires:
    - pip
    - python {{ python_min }}

    # pyproject.toml exclude these at build time for noarch, adding back here for pip check
    - libcst >=0.3.7,<=1.8.2
    - pathspec >=0.10.1,<1

about:
  home: https://github.com/hakancelikdev/unimport
  doc_url: https://unimport.hakancelik.dev/
  summary: The ultimate linter and formatter for removing unused import statements in your code.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
